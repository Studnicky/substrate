  <rect x="0" y="0" width="8" height="630" fill="#14b8a6"/>
  <!-- Logo mark (stacked bars) -->
  <rect x="80" y="200" width="80" height="22" rx="11" fill="#14b8a6"/>
  <rect x="80" y="234" width="80" height="22" rx="11" fill="#14b8a6" opacity="0.75"/>
  <rect x="80" y="268" width="80" height="22" rx="11" fill="#14b8a6" opacity="0.5"/>
  <!-- Title -->
  <text x="200" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#f8fafc">Substrate</text>
  <!-- Tagline -->
  <text x="200" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Subclass-first TypeScript primitives.</text>
  <!-- Package name -->
